<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 60" fill="none">
  <!-- Background pill -->
  <rect width="220" height="60" rx="6" fill="#1a0f0a"/>

  <!-- Decorative gold top line -->
  <rect x="16" y="10" width="40" height="1.5" fill="#C9A84C" rx="1"/>

  <!-- KFS monogram -->
  <text x="16" y="34" font-family="Georgia, serif" font-size="22" font-weight="700" fill="#C9A84C" letter-spacing="2">KFS</text>

  <!-- Divider -->
  <rect x="68" y="12" width="1.2" height="36" fill="#C9A84C" opacity="0.4" rx="1"/>

  <!-- Salon name -->
  <text x="78" y="26" font-family="Georgia, serif" font-size="11" font-weight="600" fill="#F5EFE6" letter-spacing="0.5">Kanishka's Family</text>
  <text x="78" y="41" font-family="Georgia, serif" font-size="9" font-weight="400" fill="#C9A84C" letter-spacing="2">SALON &amp; ACADEMY</text>

  <!-- Decorative gold bottom line -->
  <rect x="16" y="48" width="40" height="1.5" fill="#C9A84C" rx="1"/>
</svg>
