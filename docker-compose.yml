services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: kanishkas_salon
      POSTGRES_USER: salon_user
      POSTGRES_PASSWORD: salon_pass_2026
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - salon_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U salon_user -d kanishkas_salon"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: always
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env.local
    environment:
      DATABASE_URL: postgresql://salon_user:salon_pass_2026@db:5432/kanishkas_salon
      DIRECT_URL: postgresql://salon_user:salon_pass_2026@db:5432/kanishkas_salon
      NODE_ENV: production
      HOSTNAME: "0.0.0.0"
      # Prevents libvips from using multiple threads in Alpine/musl Docker.
      # Without this, sharp hangs indefinitely on image processing (JPEG to WebP).
      VIPS_CONCURRENCY: "1"
    ports:
      - "3001:3000"
    networks:
      - salon_net
    volumes:
      # Persist uploaded images across container restarts and rebuilds.
      - uploads_data:/app/public/uploads
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.5"
        reservations:
          memory: 512M
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  db-backup:
    image: postgres:16-alpine
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGHOST: db
      PGUSER: salon_user
      PGPASSWORD: salon_pass_2026
      PGDATABASE: kanishkas_salon
      BACKUP_DIR: /backups
      DAILY_RETENTION: "7"
      WEEKLY_RETENTION: "28"
      # Optional: S3-compatible off-site backup (Backblaze B2, AWS S3, MinIO, etc.)
      # BACKUP_S3_BUCKET: ${BACKUP_S3_BUCKET:-}
      # AWS_ACCESS_KEY_ID: ${BACKUP_AWS_ACCESS_KEY_ID:-}
      # AWS_SECRET_ACCESS_KEY: ${BACKUP_AWS_SECRET_ACCESS_KEY:-}
      # AWS_DEFAULT_REGION: ${BACKUP_AWS_REGION:-us-east-1}
      # For Backblaze B2: AWS_ENDPOINT_URL=https://s3.us-west-004.backblazeb2.com
    volumes:
      - backups_data:/backups
      - ./scripts/backup.sh:/scripts/backup.sh:ro
    networks:
      - salon_net
    entrypoint: ["sh", "/scripts/backup.sh", "--loop"]
    # Runs daily at 2 AM UTC automatically.
    # For manual one-shot: docker compose run --rm db-backup sh /scripts/backup.sh

  # Appointment reminder scheduler — runs daily at 8 PM IST (14:30 UTC)
  # Sends email + SMS + in-app reminders for tomorrow's confirmed appointments
  reminder-cron:
    image: curlimages/curl:latest
    restart: always
    depends_on:
      - app
    environment:
      CRON_SECRET: ${CRON_SECRET:-change-me-in-production}
    networks:
      - salon_net
    entrypoint: >
      sh -c 'echo "Reminder cron started. Will fire daily at ~14:30 UTC (8 PM IST)."
      while true; do
        HOUR=$$(date -u +%H)
        MIN=$$(date -u +%M)
        if [ "$$HOUR" = "14" ] && [ "$$MIN" = "30" ]; then
          echo "[$$( date -u )] Firing appointment reminders..."
          curl -s -X POST -H "x-cron-secret: $$CRON_SECRET" http://app:3000/api/cron/appointment-reminders || echo "Request failed"
          sleep 120
        fi
        sleep 30
      done'

volumes:
  postgres_data:
  uploads_data:     # persistent storage for all uploaded gallery/product/staff images
  backups_data:     # persistent storage for database backups

networks:
  salon_net:
    driver: bridge
